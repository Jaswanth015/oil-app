<!DOCTYPE html>
<html>
<head>
<title>Order Coconut Oil</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<h2>Place Oil Order</h2>
<div class="shop-info">
  <strong>🏪 JAYA LAKSHMI OILS AND GENERAL TRADERS</strong><br>
  📍 MALAMA CENTER, NARASARAOPETA
</div>
<input type="text" id="name" placeholder="Customer Name">
<input type="text" id="address" placeholder="Delivery Address">
<select id="oil">
  <option value="Pure Coconut Oil">Pure Coconut Oil</option>
  <option value="Organic Coconut Oil">Organic Coconut Oil</option>
</select>
<input type="number" id="qty" placeholder="Quantity (units)" oninput="updateTinCountAndCost()">
<p>📦 Total tins: <span id="tinCount">0</span> (1 unit = 15 kg tin)</p>
<p>💰 Total Cost: ₹ <span id="totalCost">0</span> (₹500 per unit)</p>
<p class="note">Note: 1 unit = 15 kg tin | Price per unit = ₹500</p>
<button onclick="placeOrder()">Place Order</button>
<p id="msg"></p>
<script src="script.js"></script>
</body>
</html>
