<!DOCTYPE html>
<html>
<head>
<title>Order Coconut Oil</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<h2>Place Oil Order</h2>
<input type="text" id="name" placeholder="Customer Name">
<input type="text" id="address" placeholder="Delivery Address">
<select id="oil">
<option value="Pure Coconut Oil">Pure Coconut Oil</option>
<option value="Organic Coconut Oil">Organic Coconut Oil</option>
</select>
<input type="number" id="qty" placeholder="Quantity">
<button onclick="placeOrder()">Place Order</button>
<p id="msg"></p>
<script src="script.js"></script>
</body>
</html>
