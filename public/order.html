<!DOCTYPE html>
<html>
<head>
<title>Order Oil</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<h2>🥥 Order Coconut Oil</h2>
<h3 id="welcome"></h3>

<div class="shop-info">
  <strong>🏪 JAYA LAKSHMI OILS AND GENERAL TRADERS</strong><br>
  📍 MALAMA CENTER, NARASARAOPETA
</div>

<input type="text" id="name" placeholder="Customer Name">
<input type="text" id="address" placeholder="Delivery Address">
<select id="oil">
  <option value="Pure">Pure Coconut Oil</option>
  <option value="Organic">Organic Coconut Oil</option>
</select>
<input type="number" id="qty" placeholder="Quantity (units)" oninput="updateTinCountAndCost()">

<p>📦 Total tins: <span id="tinCount">0</span> (1 unit = 15 kg tin)</p>
<p>💰 Total Cost: ₹ <span id="totalCost">0</span> (<span id="pricePerUnit">---</span> per unit)</p>
<p class="note">Note: 1 unit = 15 kg tin | Price per unit = ₹<span id="priceNote">---</span></p>

<button onclick="placeOrder()">Place Order</button>
<p id="msg"></p>
<a href="seller.html">📊 View Seller Dashboard</a>
<script src="script.js"></script>
<script>
  // Fetch current price when page loads
  let currentPrice = 500; // fallback
  fetch("/api/price")
    .then(res => res.json())
    .then(data => {
      currentPrice = data.price;
      document.getElementById("pricePerUnit").innerText = currentPrice;
      document.getElementById("priceNote").innerText = currentPrice;
      // If there is already a quantity, recalc
      updateTinCountAndCost();
    })
    .catch(err => console.error("Failed to load price", err));

  // Override updateTinCountAndCost to use currentPrice
  window.updateTinCountAndCost = function() {
    let qty = document.getElementById("qty").value;
    let tins = qty * 15;
    let cost = qty * currentPrice;
    document.getElementById("tinCount").innerText = tins;
    document.getElementById("totalCost").innerText = cost;
  };
</script>
</body>
</html>
