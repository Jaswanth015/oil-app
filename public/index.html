<!DOCTYPE html>
<html>
<head>
<title>Oil App</title>
<link rel="stylesheet" href="style.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
<h1>🥥 Coconut Oil Service</h1>
<div class="box">
  <input type="text" id="user" placeholder="Username">
  <input type="password" id="pass" placeholder="Password">
  <button onclick="login()">Login</button>
  <p id="msg"></p>
  <hr>
  <button onclick="showAdminPanel()" style="background:#555;">🔧 Admin</button>
</div>

<!-- Hidden admin panel -->
<div id="adminPanel" style="display: none; margin-top: 20px;" class="box">
  <h3>⚙️ Update Price</h3>
  <label>Current price per unit: ₹<span id="adminCurrentPrice">---</span></label><br><br>
  <label>Admin password:</label>
  <input type="password" id="adminPassword" placeholder="Enter password">
  <label>New price (₹):</label>
  <input type="number" id="newPrice" placeholder="New price" step="1" min="1">
  <button onclick="updatePrice()">Update Price</button>
  <p id="adminMsg"></p>
  <button onclick="hideAdminPanel()" style="background:#888;">Close</button>
</div>

<script src="script.js"></script>
<script>
  let currentPrice = 500;
  fetch("/api/price")
    .then(res => res.json())
    .then(data => {
      currentPrice = data.price;
      document.getElementById("adminCurrentPrice").innerText = currentPrice;
    })
    .catch(err => console.error("Failed to load price", err));

  function showAdminPanel() {
    document.getElementById("adminPanel").style.display = "block";
  }

  function hideAdminPanel() {
    document.getElementById("adminPanel").style.display = "none";
    document.getElementById("adminMsg").innerText = "";
  }

  function updatePrice() {
    const price = document.getElementById("newPrice").value;
    const password = document.getElementById("adminPassword").value;
    if (!price || price <= 0) {
      document.getElementById("adminMsg").innerText = "❌ Enter a valid price";
      return;
    }
    fetch("/api/price", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ price: parseInt(price), adminPassword: password })
    })
      .then(res => res.json())
      .then(data => {
        if (data.error) {
          document.getElementById("adminMsg").innerText = "❌ " + data.error;
        } else {
          document.getElementById("adminMsg").innerText = data.message;
          fetch("/api/price")
            .then(res => res.json())
            .then(data => {
              currentPrice = data.price;
              document.getElementById("adminCurrentPrice").innerText = currentPrice;
            });
        }
      })
      .catch(err => {
        document.getElementById("adminMsg").innerText = "❌ Network error";
      });
  }
</script>
</body>
</html>
